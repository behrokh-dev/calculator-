<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="assets/stylesheet/output.css" />
    <link rel="stylesheet" href="assets/icon/remixicon.css">
  </head>
  <body>
    <div class="min-h-screen flex items-center">
    <div class="calc">
    <input type="text" class="input" />
    <div class="numGrid">
      <div class="numbers ac" onclick="clearAll()">AC</div>
      <div class="numbers" onclick="toggleSign()">+/-</div>
      <div class="numbers" onclick="percent()">%</div>
      <div class="mathSign" onclick="op('/')">÷</div>

      <div class="numbers" onclick="para(event)">7</div>
      <div class="numbers" onclick="para(event)">8</div>
      <div class="numbers" onclick="para(event)">9</div>
      <div class="mathSign" onclick="op('*')">×</div>

      <div class="numbers" onclick="para(event)">4</div>
      <div class="numbers" onclick="para(event)">5</div>
      <div class="numbers" onclick="para(event)">6</div>
      <div class="mathSign" onclick="op('-')">−</div>

      <div class="numbers" onclick="para(event)">1</div>
      <div class="numbers" onclick="para(event)">2</div>
      <div class="numbers" onclick="para(event)">3</div>
      <div class="mathSign" onclick="op('+')">+</div>

      <div class="numbers zero" onclick="para(event)">0</div>
      <div class="numbers" onclick="para(event)">.</div>
      <div class="equal" onclick="Equal()">=</div>
    </div>
    <h2 class="result"></h2>
  </div>
    </div>
